name: Playwright Tests
on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Sanity Check API Content
      run: |
        echo "Fetching API homepage..."
        RESPONSE=$(curl -sL https://apitest.catmapper.org)
        
        if echo "$RESPONSE" | grep -q "Welcome to the CatMapper API"; then
          echo "✅ API is up and serving the correct content!"
        else
          echo "❌ API Content Mismatch!"
          echo "Received: $RESPONSE"
          exit 1
        fi
    
    - name: Install dependencies
      run: npm ci
      
    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV

    # 2. Look for existing browsers in the cache
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    # 3. Only download browsers if the cache was NOT found (hit != 'true')
    - name: Install Playwright Browsers & Deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    # 4. If cache WAS found, we still need to install the OS-level system dependencies
    - name: Install Playwright OS dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    - name: Start React App
      run: npm start & # The '&' runs it in the background

    - name: Wait for server
      run: npx wait-on http://localhost:3000 --timeout 60000

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Start React App
      run: npm start & # The '&' runs it in the background

    - name: Wait for server
      run: npx wait-on http://localhost:3000 --timeout 60000

    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30